<svg width="100%" height="100%" viewBox="0 0 1200 700" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E0F2FE" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#DCFCE7" stop-opacity="0.7"/>
    </linearGradient>
    
    <!-- Blue Brand Gradient -->
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38BDF8"/>
      <stop offset="100%" stop-color="#0284C7"/>
    </linearGradient>
    
    <!-- Green Brand Gradient -->
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#34D399"/>
      <stop offset="100%" stop-color="#16A34A"/>
    </linearGradient>

    <!-- Orange Status Gradient -->
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FBBF24"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </linearGradient>

    <!-- Card Shadow -->
    <filter id="cardShadow" x="-10%" y="-10%" width="120%" height="120%" filterUnits="userSpaceOnUse">
      <feDropShadow dx="0" dy="16" stdDeviation="24" flood-color="#0F172A" flood-opacity="0.08"/>
    </filter>

    <!-- Glow Effect -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%" filterUnits="userSpaceOnUse">
      <feGaussianBlur stdDeviation="30" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Main Background Container -->
  <rect width="1200" height="700" rx="32" fill="url(#bgGrad)" />

  <!-- Ambient Glow Circles -->
  <circle cx="250" cy="200" r="180" fill="#38BDF8" opacity="0.12" filter="url(#glow)"/>
  <circle cx="950" cy="500" r="220" fill="#34D399" opacity="0.12" filter="url(#glow)"/>

  <!-- Decorative Grid Overlay -->
  <g opacity="0.03" stroke="#0F172A" stroke-width="1.5">
    <path d="M 0,100 L 1200,100 M 0,200 L 1200,200 M 0,300 L 1200,300 M 0,400 L 1200,400 M 0,500 L 1200,500 M 0,600 L 1200,600" />
    <path d="M 100,0 L 100,700 M 200,0 L 200,700 M 300,0 L 300,700 M 400,0 L 400,700 M 500,0 L 500,700 M 600,0 L 600,700 M 700,0 L 700,700 M 800,0 L 800,700 M 900,0 L 900,700 M 1000,0 L 1000,700 M 1100,0 L 1100,700" />
  </g>

  <!-- Left Side: Mobile App Mockup (Citizen Report Interface) -->
  <g transform="translate(180, 80)">
    <!-- Phone Body -->
    <rect x="0" y="0" width="310" height="540" rx="44" fill="#0F172A" />
    <rect x="8" y="8" width="294" height="524" rx="36" fill="#F8FAFC" />
    
    <!-- Phone Screen Notch -->
    <rect x="95" y="0" width="120" height="24" rx="12" fill="#0F172A" />
    <circle cx="115" cy="12" r="4" fill="#334155" />
    <rect x="135" y="10" width="40" height="4" rx="2" fill="#334155" />
    
    <!-- Mobile App Header -->
    <rect x="24" y="45" width="40" height="40" rx="12" fill="url(#blueGrad)" opacity="0.1" />
    <text x="44" y="69" font-family="'Inter', sans-serif" font-size="16" font-weight="700" fill="#0284C7" text-anchor="middle">P</text>
    <text x="76" y="62" font-family="'Inter', sans-serif" font-size="14" font-weight="700" fill="#0F172A">PeopleVoice</text>
    <text x="76" y="78" font-family="'Inter', sans-serif" font-size="11" font-weight="500" fill="#64748B">National Network</text>
    
    <!-- Simulated Map Area in Phone -->
    <g transform="translate(24, 105)">
      <rect x="0" y="0" width="262" height="180" rx="18" fill="#E2E8F0" />
      <!-- Stylized Streets -->
      <path d="M 0,40 L 262,80 M 80,0 L 120,180 M 180,0 L 140,180 M 0,140 L 262,100" stroke="#FFFFFF" stroke-width="8" stroke-linecap="round" />
      <path d="M 0,40 L 262,80 M 80,0 L 120,180 M 180,0 L 140,180 M 0,140 L 262,100" stroke="#CBD5E1" stroke-width="2" stroke-linecap="round" />
      <!-- Pulsing Map Marker Pin -->
      <circle cx="110" cy="110" r="18" fill="#0284C7" opacity="0.2"/>
      <circle cx="110" cy="110" r="10" fill="#0284C7" opacity="0.4"/>
      <path d="M 110,95 C 103,95 98,100 98,107 C 98,116 110,127 110,127 C 110,127 122,116 122,107 C 122,100 117,95 110,95 Z" fill="#EF4444" />
      <circle cx="110" cy="104" r="4" fill="#FFFFFF" />
    </g>

    <!-- Simulated Submission Success Modal in Phone -->
    <g transform="translate(24, 300)">
      <rect x="0" y="0" width="262" height="195" rx="20" fill="#FFFFFF" filter="url(#cardShadow)" />
      <!-- Success Icon -->
      <circle cx="131" cy="45" r="24" fill="#DCFCE7" />
      <path d="M 122,45 L 128,51 L 140,39" stroke="#16A34A" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" />
      <!-- Label -->
      <text x="131" y="90" font-family="'Inter', sans-serif" font-size="14" font-weight="700" fill="#0F172A" text-anchor="middle">Report Logged!</text>
      <text x="131" y="110" font-family="'Inter', sans-serif" font-size="11" font-weight="500" fill="#64748B" text-anchor="middle">Pothole Case #105 Filed</text>
      <!-- Action button in phone -->
      <rect x="24" y="135" width="214" height="40" rx="12" fill="url(#greenGrad)" />
      <text x="131" y="159" font-family="'Inter', sans-serif" font-size="12" font-weight="700" fill="#FFFFFF" text-anchor="middle">Track Resolution</text>
    </g>
    
    <!-- Home Indicator -->
    <rect x="105" y="515" width="100" height="5" rx="2.5" fill="#94A3B8" />
  </g>

  <!-- Right Side: Dashboard Widgets (Civic Analytics & Happy Citizens) -->
  
  <!-- Card 1: Resolving Streetlight Widget -->
  <g transform="translate(560, 100)" filter="url(#cardShadow)">
    <rect x="0" y="0" width="420" height="120" rx="24" fill="#FFFFFF" />
    <!-- Light Icon badge -->
    <rect x="24" y="24" width="72" height="72" rx="18" fill="#FEF3C7" />
    <!-- Streetlight icon -->
    <path d="M 60,38 L 60,70 M 52,46 C 52,40 68,40 68,46 L 66,54 L 54,54 Z M 50,70 L 70,70" stroke="#D97706" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="60" cy="38" r="4" fill="#FBBF24" />
    
    <!-- Card Text -->
    <text x="112" y="48" font-family="'Inter', sans-serif" font-size="15" font-weight="700" fill="#0F172A">Case #102: Broken Streetlight</text>
    <text x="112" y="70" font-family="'Inter', sans-serif" font-size="12" font-weight="500" fill="#64748B">Connaught Place, New Delhi</text>
    <!-- Progress Indicator -->
    <rect x="112" y="84" width="180" height="8" rx="4" fill="#E2E8F0" />
    <rect x="112" y="84" width="120" height="8" rx="4" fill="url(#orangeGrad)" />

    <!-- Status pill -->
    <rect x="306" y="44" width="90" height="32" rx="16" fill="#FEF3C7" />
    <text x="351" y="64" font-family="'Inter', sans-serif" font-size="11" font-weight="700" fill="#D97706" text-anchor="middle">IN PROGRESS</text>
  </g>

  <!-- Card 2: Pothole Resolved Card -->
  <g transform="translate(630, 250)" filter="url(#cardShadow)">
    <rect x="0" y="0" width="420" height="120" rx="24" fill="#FFFFFF" />
    <!-- Happy Check icon badge -->
    <rect x="24" y="24" width="72" height="72" rx="18" fill="#DCFCE7" />
    <!-- Road Fix Icon -->
    <path d="M 40,68 C 50,56 70,56 80,68 M 46,52 L 74,52 M 60,40 L 60,52" stroke="#16A34A" stroke-width="3" stroke-linecap="round" />
    
    <text x="112" y="48" font-family="'Inter', sans-serif" font-size="15" font-weight="700" fill="#0F172A">Case #101: Road Pothole Fixed</text>
    <text x="112" y="70" font-family="'Inter', sans-serif" font-size="12" font-weight="500" fill="#64748B">Marine Drive, Mumbai</text>
    <rect x="112" y="84" width="180" height="8" rx="4" fill="#E2E8F0" />
    <rect x="112" y="84" width="180" height="8" rx="4" fill="url(#greenGrad)" />

    <!-- Status pill -->
    <rect x="306" y="44" width="90" height="32" rx="16" fill="#DCFCE7" />
    <text x="351" y="64" font-family="'Inter', sans-serif" font-size="11" font-weight="700" fill="#16A34A" text-anchor="middle">RESOLVED</text>
  </g>

  <!-- Card 3: Collaborative Smart Community Vibe Card -->
  <g transform="translate(590, 400)" filter="url(#cardShadow)">
    <rect x="0" y="0" width="420" height="170" rx="28" fill="#FFFFFF" />
    
    <!-- Section Title -->
    <text x="28" y="42" font-family="'Inter', sans-serif" font-size="14" font-weight="700" fill="#0284C7" letter-spacing="0.05em">ACTIVE COMMUNITY ACTION</text>
    
    <!-- Avatars list representing citizens -->
    <g transform="translate(28, 65)">
      <!-- Avatar 1 -->
      <circle cx="20" cy="20" r="20" fill="#E0F2FE" />
      <path d="M 10,34 C 10,26 15,24 20,24 C 25,24 30,26 30,34" fill="#0284C7" />
      <circle cx="20" cy="15" r="6" fill="#0284C7" />
      
      <!-- Avatar 2 -->
      <circle cx="50" cy="20" r="20" fill="#DCFCE7" />
      <path d="M 40,34 C 40,26 45,24 50,24 C 55,24 60,26 60,34" fill="#16A34A" />
      <circle cx="50" cy="15" r="6" fill="#16A34A" />
      
      <!-- Avatar 3 -->
      <circle cx="80" cy="20" r="20" fill="#FEE2E2" />
      <path d="M 70,34 C 70,26 75,24 80,24 C 85,24 90,26 90,34" fill="#EF4444" />
      <circle cx="80" cy="15" r="6" fill="#EF4444" />

      <!-- Avatar 4 -->
      <circle cx="110" cy="20" r="20" fill="#FEF3C7" />
      <path d="M 100,34 C 100,26 105,24 110,24 C 115,24 120,26 120,34" fill="#D97706" />
      <circle cx="110" cy="15" r="6" fill="#D97706" />

      <!-- Plus Badge -->
      <circle cx="140" cy="20" r="20" fill="#F1F5F9" />
      <text x="140" y="24" font-family="'Inter', sans-serif" font-size="12" font-weight="700" fill="#475569" text-anchor="middle">+1.2k</text>
    </g>
    
    <!-- Community description -->
    <text x="28" y="125" font-family="'Inter', sans-serif" font-size="13" font-weight="600" fill="#0F172A">Join your local neighborhood action network.</text>
    <text x="28" y="145" font-family="'Inter', sans-serif" font-size="11" font-weight="500" fill="#64748B">Connecting citizens with local municipal services for a cleaner city.</text>
  </g>

  <!-- Connective Floating Nodes / Graphic Accents -->
  <g opacity="0.6">
    <path d="M 450,220 C 500,200 520,180 560,170" stroke="#0284C7" stroke-width="2" stroke-dasharray="6 6" fill="none" />
    <circle cx="560" cy="170" r="4" fill="#0284C7" />
    <circle cx="450" cy="220" r="4" fill="#0284C7" />

    <path d="M 480,380 C 530,360 550,330 630,320" stroke="#16A34A" stroke-width="2" stroke-dasharray="6 6" fill="none" />
    <circle cx="630" cy="320" r="4" fill="#16A34A" />
    <circle cx="480" cy="380" r="4" fill="#16A34A" />
  </g>
</svg>
